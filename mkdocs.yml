site_name: InQL
site_description: Typed relational logic for governed data systems
site_url: https://encero-systems.github.io/InQL/
repo_url: https://github.com/encero-systems/InQL
repo_name: encero-systems/InQL
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  font: false
  palette:
    - scheme: slate
      primary: black
      accent: cyan
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/prismplane.css?v=20260709-reference-fit-1

nav:
  - Home: index.md
  - Docs map: docs_map.md
  - Architecture: architecture.md
  - Language:
      - Overview: language/README.md
      - Explanation:
          - Dataset carriers: language/explanation/dataset_carriers.md
          - Execution context: language/explanation/execution_context.md
      - How-to guides:
          - Overview: language/how-to/README.md
          - Dataset transformations: language/how-to/dataset_transformations.md
          - Normalize semi-structured fields: language/how-to/normalize_semistructured_fields.md
          - Nested row values: language/how-to/nested_row_values.md
          - Generator rows: language/how-to/generator_rows.md
          - Window columns: language/how-to/window_columns.md
          - Approximate metrics: language/how-to/approximate_metrics.md
          - Typed HLL sketches: language/how-to/typed_hll_sketches.md
          - Variant payloads: language/how-to/variant_payloads.md
          - Execution observations: language/how-to/execution_observations.md
          - Quality observations: language/how-to/quality_observations.md
          - Governed evidence: language/how-to/governed_evidence.md
          - Inspect plan lineage: language/how-to/inspect_plan_lineage.md
      - Reference:
          - Dataset carriers: language/reference/dataset_carriers.md
          - Dataset methods: language/reference/dataset_methods.md
          - Query blocks: language/reference/query_blocks.md
          - Execution context: language/reference/execution_context.md
          - Inspection: language/reference/inspection.md
          - Quality: language/reference/quality.md
          - Governance: language/reference/governance.md
          - Builders:
              - Filters: language/reference/builders/filters.md
              - Projections: language/reference/builders/projections.md
              - Aggregates: language/reference/builders/aggregates.md
          - Functions:
              - Index: language/reference/functions/index.md
              - Approximate: language/reference/functions/approximate.md
              - Format: language/reference/functions/format.md
              - Generators: language/reference/functions/generators.md
              - Nested: language/reference/functions/nested.md
              - Sketches: language/reference/functions/sketches.md
              - Variants: language/reference/functions/variants.md
              - Windows: language/reference/functions/windows.md
          - Substrait:
              - Conformance: language/reference/substrait/conformance.md
              - Operator catalog: language/reference/substrait/operator_catalog.md
              - Read root binding contract: language/reference/substrait/read_root_binding_contract.md
              - Revision and extension policy: language/reference/substrait/revision_and_extension_policy.md
