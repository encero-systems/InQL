site_name: IncQL
site_description: Typed relational logic for governed data systems
site_url: https://encero-systems.github.io/IncQL/
repo_url: https://github.com/encero-systems/IncQL
repo_name: encero-systems/IncQL
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  logo: shared/brand/incql-mark.png
  font: false
  highlightjs: false
  pygments_style: default
  pygments_style_dark: native
  palette:
    - scheme: slate
      primary: black
      accent: cyan
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - content.code.copy

plugins:
  - search

hooks:
  - mkdocs_hooks.py

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      use_pygments: true
      pygments_lang_class: true
      extend_pygments_lang:
        - name: incan
          lang: incan
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/prismplane.css?v=20260717-master-diagram-1

extra_javascript:
  - javascripts/prismplane.js?v=20260717-master-diagram-1

nav:
  - Home: index.md
  - Learn:
      - Overview: language/README.md
      - Concepts:
          - Dataset carriers: language/explanation/dataset_carriers.md
          - Execution context: language/explanation/execution_context.md
  - Guides:
      - Overview: language/how-to/README.md
      - Dataset transformations: language/how-to/dataset_transformations.md
      - Normalize semi-structured fields: language/how-to/normalize_semistructured_fields.md
      - Nested row values: language/how-to/nested_row_values.md
      - Generator rows: language/how-to/generator_rows.md
      - Window columns: language/how-to/window_columns.md
      - Approximate metrics: language/how-to/approximate_metrics.md
      - Typed HLL sketches: language/how-to/typed_hll_sketches.md
      - Variant payloads: language/how-to/variant_payloads.md
      - Execution observations: language/how-to/execution_observations.md
      - Quality observations: language/how-to/quality_observations.md
      - Governed evidence: language/how-to/governed_evidence.md
      - Inspect plan lineage: language/how-to/inspect_plan_lineage.md
  - Reference:
      - Overview: language/reference/README.md
      - Core:
          - Dataset carriers: language/reference/dataset_carriers.md
          - Dataset methods: language/reference/dataset_methods.md
          - Query blocks: language/reference/query_blocks.md
          - Execution context: language/reference/execution_context.md
          - Inspection: language/reference/inspection.md
