name: "Feature request"
description: Propose an enhancement to the IncQL package, specs, or contributor workflow.
title: "feature - "
type: Feature
labels: ["feature"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: What part of the project does this mainly concern?
      multiple: true
      options:
        - Package & tests
        - Specification (RFCs)
        - Documentation
        - Automation & repo config
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? What is painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Examples welcome (e.g. API sketch or `query {}` shape).
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve it (including "do nothing").
  - type: textarea
    id: scope
    attributes:
      label: Scope / acceptance criteria
      description: What is included, what is not, and how we know it is done.
      placeholder: |
        - In scope:
        - Out of scope:
        - Done when:
